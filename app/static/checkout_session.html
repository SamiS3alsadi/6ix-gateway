<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="stripe-pk" content="{{PK}}" />
  <meta name="client-secret" content="{{CLIENT_SECRET}}" />
  <meta name="success-url" content="{{SUCCESS_URL}}" />
  <title>{{TITLE}}</title>
  <script src="https://js.stripe.com/v3/"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; }

    :root {
      --ink: #0a0a0a;
      --ink-soft: #555;
      --line: #e6e6e6;
      --line-strong: #0a0a0a;
      --bg: #fafafa;
      --paper: #ffffff;
      --success: #0a7a3b;
      --danger: #b00020;
      --radius: 6px;
    }

    html, body {
      margin: 0;
      padding: 0;
      background: var(--bg);
      color: var(--ink);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Inter,
                   Roboto, "Helvetica Neue", Arial, sans-serif;
      font-size: 15px;
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    .page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 48px 20px;
    }

    .card {
      background: var(--paper);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      width: 100%;
      max-width: 440px;
      padding: 36px 32px;
    }

    .brand {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      margin-bottom: 28px;
    }
    .brand .mark {
      font-weight: 700;
      letter-spacing: 0.4px;
      font-size: 14px;
      text-transform: uppercase;
    }
    .brand .step {
      font-size: 12px;
      color: var(--ink-soft);
      letter-spacing: 0.4px;
      text-transform: uppercase;
    }

    h1 {
      font-size: 22px;
      font-weight: 600;
      margin: 0 0 6px;
      letter-spacing: -0.2px;
    }
    .lead {
      color: var(--ink-soft);
      font-size: 14px;
      margin: 0 0 28px;
    }

    .summary {
      background: #fafafa;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 16px 18px;
      margin-bottom: 24px;
    }
    .summary .row {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      gap: 12px;
    }
    .summary .row + .row {
      margin-top: 8px;
    }
    .summary .label {
      color: var(--ink-soft);
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.4px;
    }
    .summary .value {
      font-weight: 500;
      text-align: right;
      word-break: break-word;
    }
    .summary .total .label { color: var(--ink); font-weight: 600; }
    .summary .total .value {
      font-size: 22px;
      font-weight: 700;
      letter-spacing: -0.3px;
    }

    .field {
      margin-bottom: 18px;
    }
    .field label {
      display: block;
      font-size: 12px;
      font-weight: 500;
      color: var(--ink-soft);
      margin-bottom: 6px;
      letter-spacing: 0.2px;
      text-transform: uppercase;
    }
    .card-element {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 13px 14px;
      font-size: 15px;
      color: var(--ink);
      background: var(--paper);
      transition: border-color 120ms ease, box-shadow 120ms ease;
    }
    .card-element.StripeElement--focus {
      border-color: var(--line-strong);
      box-shadow: 0 0 0 1px var(--line-strong) inset;
    }
    .card-element.StripeElement--invalid { border-color: var(--danger); }

    .pay-btn {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: var(--radius);
      background: var(--ink);
      color: #fff;
      font-size: 15px;
      font-weight: 600;
      letter-spacing: 0.2px;
      cursor: pointer;
      transition: background 120ms ease, transform 80ms ease;
    }
    .pay-btn:hover { background: #1f1f1f; }
    .pay-btn:active { transform: translateY(1px); }
    .pay-btn[disabled] {
      background: #aaa;
      cursor: not-allowed;
      transform: none;
    }

    .status {
      margin-top: 18px;
      padding: 12px 14px;
      border-radius: var(--radius);
      font-size: 13px;
      display: none;
    }
    .status.show { display: block; }
    .status.success {
      background: #f0f8f2;
      color: var(--success);
      border: 1px solid #c9e3d2;
    }
    .status.error {
      background: #fff2f3;
      color: var(--danger);
      border: 1px solid #f0c8cd;
    }
    .status.info {
      background: #f5f5f5;
      color: var(--ink-soft);
      border: 1px solid var(--line);
    }

    .footnote {
      margin-top: 24px;
      font-size: 11px;
      color: var(--ink-soft);
      letter-spacing: 0.2px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .footnote .lock::before {
      content: "🔒 ";
    }
  </style>
</head>
<body>
  <div class="page">
    <main class="card">
      <div class="brand">
        <div class="mark">6ix Gateway</div>
        <div class="step">Secure checkout</div>
      </div>

      <h1>Complete your payment</h1>
      <p class="lead">Payment is processed securely by Stripe.</p>

      <div class="summary">
        <div class="row">
          <span class="label">Description</span>
          <span class="value">{{DESCRIPTION}}</span>
        </div>
        <div class="row total">
          <span class="label">Total</span>
          <span class="value">{{AMOUNT_DISPLAY}}</span>
        </div>
      </div>

      <form id="checkout-form" novalidate>
        <div class="field">
          <label>Card information</label>
          <div id="card-element" class="card-element"></div>
        </div>

        <button id="pay-btn" class="pay-btn" type="submit">Pay {{AMOUNT_DISPLAY}}</button>

        <div id="status" class="status" role="status" aria-live="polite"></div>

        <div class="footnote">
          <span class="lock">Encrypted &amp; PCI compliant via Stripe</span>
          <span>Test mode</span>
        </div>
      </form>
    </main>
  </div>

  <script>
    (function () {
      const pk = document.querySelector('meta[name="stripe-pk"]').content;
      const clientSecret = document.querySelector('meta[name="client-secret"]').content;
      const successUrl = document.querySelector('meta[name="success-url"]').content;

      const stripe = Stripe(pk);
      const elements = stripe.elements();
      const card = elements.create('card', {
        style: {
          base: {
            fontSize: '15px',
            color: '#0a0a0a',
            fontFamily: '-apple-system, BlinkMacSystemFont, "Segoe UI", Inter, Roboto, sans-serif',
            '::placeholder': { color: '#999' },
          },
          invalid: { color: '#b00020' },
        },
      });
      card.mount('#card-element');

      const form = document.getElementById('checkout-form');
      const payBtn = document.getElementById('pay-btn');
      const statusEl = document.getElementById('status');

      function showStatus(kind, message) {
        statusEl.className = 'status show ' + kind;
        statusEl.textContent = message;
      }

      form.addEventListener('submit', async (e) => {
        e.preventDefault();
        payBtn.disabled = true;
        const originalLabel = payBtn.textContent;
        payBtn.textContent = 'Processing…';
        showStatus('info', 'Confirming card…');

        const result = await stripe.confirmCardPayment(clientSecret, {
          payment_method: { card: card },
        });

        if (result.error) {
          showStatus('error', result.error.message || 'Payment failed.');
          payBtn.disabled = false;
          payBtn.textContent = originalLabel;
          return;
        }

        if (result.paymentIntent && result.paymentIntent.status === 'succeeded') {
          showStatus('success', 'Payment succeeded · ' + result.paymentIntent.id);
          payBtn.textContent = 'Paid';
          card.clear();

          if (successUrl && /^https?:\/\//i.test(successUrl)) {
            setTimeout(() => { window.location.href = successUrl; }, 1200);
          }
        } else {
          showStatus(
            'info',
            'Payment status: ' + (result.paymentIntent && result.paymentIntent.status)
          );
          payBtn.disabled = false;
          payBtn.textContent = originalLabel;
        }
      });
    })();
  </script>
</body>
</html>
