<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{{TITLE}}</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    :root {
      --ink: #0a0a0a;
      --ink-soft: #555;
      --line: #e6e6e6;
      --bg: #fafafa;
      --paper: #ffffff;
      --success: #0a7a3b;
      --radius: 6px;
    }
    html, body {
      margin: 0;
      padding: 0;
      background: var(--bg);
      color: var(--ink);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Inter,
                   Roboto, "Helvetica Neue", Arial, sans-serif;
      font-size: 15px;
      line-height: 1.5;
    }
    .page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 48px 20px;
    }
    .card {
      background: var(--paper);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      width: 100%;
      max-width: 440px;
      padding: 36px 32px;
      text-align: center;
    }
    .brand {
      font-weight: 700;
      letter-spacing: 0.4px;
      font-size: 14px;
      text-transform: uppercase;
      margin-bottom: 24px;
    }
    .icon {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 16px;
      font-size: 22px;
      color: #fff;
      background: var(--ink);
    }
    .icon.success { background: var(--success); }
    h1 {
      font-size: 22px;
      font-weight: 600;
      margin: 0 0 8px;
      letter-spacing: -0.2px;
    }
    p {
      color: var(--ink-soft);
      font-size: 14px;
      margin: 0 0 24px;
    }
    .btn {
      display: inline-block;
      padding: 12px 24px;
      background: var(--ink);
      color: #fff;
      text-decoration: none;
      border-radius: var(--radius);
      font-size: 14px;
      font-weight: 600;
      letter-spacing: 0.2px;
    }
    .btn:hover { background: #1f1f1f; }
  </style>
</head>
<body>
  <div class="page">
    <main class="card">
      <div class="brand">6ix Gateway</div>
      <div class="icon {{ICON_CLASS}}">{{ICON_GLYPH}}</div>
      <h1>{{HEADING}}</h1>
      <p>{{BODY}}</p>
      {{ACTION_HTML}}
    </main>
  </div>
</body>
</html>
