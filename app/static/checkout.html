<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="stripe-pk" content="pk_test_51TapyIFo0zU5vpOek7zXC2VjnvpEUYFQbZTuAiDec6pRQ2AfMAA6hTLg4BqUsKKKg345PVIJGLdBwLhazOosBSh8005ItqQNe4" />
  <title>Checkout — 6ix Gateway</title>
  <script src="https://js.stripe.com/v3/"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; }

    :root {
      --ink: #0a0a0a;
      --ink-soft: #555;
      --line: #e6e6e6;
      --line-strong: #0a0a0a;
      --bg: #fafafa;
      --paper: #ffffff;
      --success: #0a7a3b;
      --danger: #b00020;
      --radius: 6px;
    }

    html, body {
      margin: 0;
      padding: 0;
      background: var(--bg);
      color: var(--ink);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Inter,
                   Roboto, "Helvetica Neue", Arial, sans-serif;
      font-size: 15px;
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    .page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 48px 20px;
    }

    .card {
      background: var(--paper);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      width: 100%;
      max-width: 440px;
      padding: 36px 32px;
    }

    .brand {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      margin-bottom: 28px;
    }
    .brand .mark {
      font-weight: 700;
      letter-spacing: 0.4px;
      font-size: 14px;
      text-transform: uppercase;
    }
    .brand .step {
      font-size: 12px;
      color: var(--ink-soft);
      letter-spacing: 0.4px;
      text-transform: uppercase;
    }

    h1 {
      font-size: 22px;
      font-weight: 600;
      margin: 0 0 6px;
      letter-spacing: -0.2px;
    }
    .lead {
      color: var(--ink-soft);
      font-size: 14px;
      margin: 0 0 28px;
    }

    .field {
      margin-bottom: 18px;
    }
    .field label {
      display: block;
      font-size: 12px;
      font-weight: 500;
      color: var(--ink-soft);
      margin-bottom: 6px;
      letter-spacing: 0.2px;
      text-transform: uppercase;
    }
    .input, .card-element {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 12px 14px;
      font-size: 15px;
      color: var(--ink);
      background: var(--paper);
      transition: border-color 120ms ease, box-shadow 120ms ease;
    }
    .input:focus {
      outline: none;
      border-color: var(--line-strong);
      box-shadow: 0 0 0 1px var(--line-strong) inset;
    }
    .card-element {
      padding: 13px 14px;
    }
    .card-element.StripeElement--focus {
      border-color: var(--line-strong);
      box-shadow: 0 0 0 1px var(--line-strong) inset;
    }
    .card-element.StripeElement--invalid { border-color: var(--danger); }

    .amount-row {
      display: grid;
      grid-template-columns: 80px 1fr;
      gap: 10px;
    }
    .amount-prefix {
      display: flex;
      align-items: center;
      justify-content: center;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      font-weight: 600;
      color: var(--ink-soft);
    }

    .pay-btn {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: var(--radius);
      background: var(--ink);
      color: #fff;
      font-size: 15px;
      font-weight: 600;
      letter-spacing: 0.2px;
      cursor: pointer;
      transition: background 120ms ease, transform 80ms ease;
    }
    .pay-btn:hover { background: #1f1f1f; }
    .pay-btn:active { transform: translateY(1px); }
    .pay-btn[disabled] {
      background: #aaa;
      cursor: not-allowed;
      transform: none;
    }

    .status {
      margin-top: 18px;
      padding: 12px 14px;
      border-radius: var(--radius);
      font-size: 13px;
      display: none;
    }
    .status.show { display: block; }
    .status.success {
      background: #f0f8f2;
      color: var(--success);
      border: 1px solid #c9e3d2;
    }
    .status.error {
      background: #fff2f3;
      color: var(--danger);
      border: 1px solid #f0c8cd;
    }
    .status.info {
      background: #f5f5f5;
      color: var(--ink-soft);
      border: 1px solid var(--line);
    }

    .footnote {
      margin-top: 24px;
      font-size: 11px;
      color: var(--ink-soft);
      letter-spacing: 0.2px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .footnote .lock::before {
      content: "🔒 ";
    }

    /* --- developer-only block, visually demoted ----------------------- */
    .dev {
      margin-top: 32px;
      padding-top: 20px;
      border-top: 1px dashed var(--line);
    }
    .dev .label {
      font-size: 11px;
      letter-spacing: 0.6px;
      text-transform: uppercase;
      color: var(--ink-soft);
      margin-bottom: 8px;
      display: block;
    }
    .dev input {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 10px 12px;
      font-size: 12px;
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      color: var(--ink);
      background: #fcfcfc;
    }
    .dev input:focus {
      outline: none;
      border-color: var(--line-strong);
    }
    .dev .hint {
      font-size: 11px;
      color: var(--ink-soft);
      margin-top: 6px;
    }
  </style>
</head>
<body>
  <div class="page">
    <main class="card">
      <div class="brand">
        <div class="mark">6ix Gateway</div>
        <div class="step">Secure checkout</div>
      </div>

      <h1>Complete your payment</h1>
      <p class="lead">Enter your details below. Payment is processed securely by Stripe.</p>

      <form id="checkout-form" novalidate>
        <div class="field">
          <label for="amount">Amount</label>
          <div class="amount-row">
            <div class="amount-prefix">USD</div>
            <input
              id="amount"
              class="input"
              type="number"
              inputmode="decimal"
              step="0.01"
              min="0.50"
              placeholder="19.99"
              required
            />
          </div>
        </div>

        <div class="field">
          <label for="description">Description</label>
          <input
            id="description"
            class="input"
            type="text"
            maxlength="200"
            placeholder="What is this payment for?"
            required
          />
        </div>

        <div class="field">
          <label>Card information</label>
          <div id="card-element" class="card-element"></div>
        </div>

        <button id="pay-btn" class="pay-btn" type="submit">Pay</button>

        <div id="status" class="status" role="status" aria-live="polite"></div>

        <div class="footnote">
          <span class="lock">Encrypted &amp; PCI compliant via Stripe</span>
          <span>Test mode</span>
        </div>
      </form>

      <div class="dev">
        <label class="label" for="api-key">Developer · API key</label>
        <input
          id="api-key"
          type="text"
          placeholder="gw_live_…"
          autocomplete="off"
          spellcheck="false"
        />
        <p class="hint">Temporary field for testing. A real checkout would inject this server-side.</p>
      </div>
    </main>
  </div>

  <script>
    (function () {
      const pk = document.querySelector('meta[name="stripe-pk"]').getAttribute('content');
      const stripe = Stripe(pk);
      const elements = stripe.elements();
      const card = elements.create('card', {
        style: {
          base: {
            fontSize: '15px',
            color: '#0a0a0a',
            fontFamily: '-apple-system, BlinkMacSystemFont, "Segoe UI", Inter, Roboto, sans-serif',
            '::placeholder': { color: '#999' },
          },
          invalid: { color: '#b00020' },
        },
      });
      card.mount('#card-element');

      const form = document.getElementById('checkout-form');
      const payBtn = document.getElementById('pay-btn');
      const amountInput = document.getElementById('amount');
      const descInput = document.getElementById('description');
      const apiKeyInput = document.getElementById('api-key');
      const statusEl = document.getElementById('status');

      function showStatus(kind, message) {
        statusEl.className = 'status show ' + kind;
        statusEl.textContent = message;
      }
      function clearStatus() {
        statusEl.className = 'status';
        statusEl.textContent = '';
      }

      function dollarsToCents(value) {
        // Avoid float drift — work in string-space then parse the integer.
        const [whole, frac = ''] = String(value).split('.');
        const cents = (whole || '0').replace(/[^0-9]/g, '') + (frac + '00').slice(0, 2);
        return parseInt(cents, 10);
      }

      function formatBtn(dollars) {
        const n = Number(dollars);
        if (!Number.isFinite(n) || n <= 0) return 'Pay';
        return 'Pay $' + n.toFixed(2);
      }

      amountInput.addEventListener('input', () => {
        payBtn.textContent = formatBtn(amountInput.value);
      });

      function randomKey() {
        if (window.crypto && crypto.randomUUID) return 'ck_' + crypto.randomUUID();
        return 'ck_' + Math.random().toString(36).slice(2) + Date.now().toString(36);
      }

      form.addEventListener('submit', async (e) => {
        e.preventDefault();
        clearStatus();

        const apiKey = apiKeyInput.value.trim();
        if (!apiKey) {
          showStatus('error', 'Enter your API key in the developer field below.');
          return;
        }

        const amountCents = dollarsToCents(amountInput.value);
        if (!amountCents || amountCents < 50) {
          showStatus('error', 'Enter an amount of at least $0.50.');
          return;
        }

        const description = descInput.value.trim();
        if (!description) {
          showStatus('error', 'Add a short description.');
          return;
        }

        payBtn.disabled = true;
        payBtn.textContent = 'Processing…';
        showStatus('info', 'Creating payment intent…');

        let clientSecret;
        try {
          const res = await fetch('/payments/intents', {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json',
              'Authorization': 'Bearer ' + apiKey,
            },
            body: JSON.stringify({
              amount: amountCents,
              currency: 'usd',
              description: description,
              idempotency_key: randomKey(),
            }),
          });
          const body = await res.json();
          if (!res.ok) {
            const msg = body && body.detail ? body.detail : 'Unable to create payment intent.';
            showStatus('error', msg);
            payBtn.disabled = false;
            payBtn.textContent = formatBtn(amountInput.value);
            return;
          }
          clientSecret = body.client_secret;
        } catch (err) {
          showStatus('error', 'Network error reaching the gateway.');
          payBtn.disabled = false;
          payBtn.textContent = formatBtn(amountInput.value);
          return;
        }

        showStatus('info', 'Confirming card…');
        const result = await stripe.confirmCardPayment(clientSecret, {
          payment_method: { card: card },
        });

        if (result.error) {
          showStatus('error', result.error.message || 'Payment failed.');
          payBtn.disabled = false;
          payBtn.textContent = formatBtn(amountInput.value);
          return;
        }

        if (result.paymentIntent && result.paymentIntent.status === 'succeeded') {
          showStatus(
            'success',
            'Payment succeeded · ' + result.paymentIntent.id
          );
          payBtn.textContent = 'Paid';
          card.clear();
          descInput.value = '';
          amountInput.value = '';
        } else {
          showStatus(
            'info',
            'Payment status: ' + (result.paymentIntent && result.paymentIntent.status)
          );
          payBtn.disabled = false;
          payBtn.textContent = formatBtn(amountInput.value);
        }
      });
    })();
  </script>
</body>
</html>
